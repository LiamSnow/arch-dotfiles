[[mgr.prepend_keymap]]
on = [ " ", "c" ]
run = 'shell --block -- printf "\033]7;file://%s\033\\" "$PWD"'
desc = "Update terminal CWD"

[[mgr.prepend_keymap]]
on = [ ":", "q" ]
run = "quit"
desc = "Quit"

# Relative Motions

[[mgr.prepend_keymap]]
on = [ "1" ]
run = "plugin relative-motions 1"
desc = "Move in relative steps"

